name: Generate Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    name: Generate static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install jinja2 pyyaml "ruamel.yaml"

      - name: Generate site
        run: python site-src/generate.py

      - name: Commit generated docs
        run: |
          git config user.name  "cube-registry-bot"
          git config user.email "cube-registry-bot@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No site changes" || \
            git commit -s -m "ci: regenerate site [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: generate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
